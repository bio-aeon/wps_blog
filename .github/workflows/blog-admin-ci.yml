name: Blog Admin CI

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]

permissions:
  contents: read

jobs:
  test:

    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v6
    - name: Set up Python
      uses: actions/setup-python@v6
      with:
        python-version: '3.12'
        cache: 'pip'
        cache-dependency-path: blog-admin/requirements.txt
    - name: Install dependencies
      working-directory: ./blog-admin
      run: pip install -r requirements.txt
    - name: Run tests
      working-directory: ./blog-admin/blog_admin
      run: python manage.py test blog_admin.tests --settings=blog_admin.test_settings
